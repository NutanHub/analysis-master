<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MSBTE PaperHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/components.css">
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            margin: 0;
        }

        .auth-container {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
            max-width: 400px;
            width: 100%;
        }

        .auth-header {
            text-align: center;
            padding: 2rem 2rem 1rem;
            background: linear-gradient(135deg, #f8faff 0%, #f1f5f9 100%);
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: #6b7280;
        }

        .auth-form {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .forgot-password {
            text-align: right;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }

        .forgot-password a {
            color: #6366f1;
            text-decoration: none;
            font-size: 0.875rem;
        }

        .submit-btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: #9ca3af;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e5e7eb;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .oauth-buttons {
            display: flex;
            gap: 1rem;
        }

        .oauth-btn {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .oauth-btn:hover {
            border-color: #6366f1;
            background: #f8faff;
        }

        .auth-footer {
            text-align: center;
            padding: 1.5rem;
            background: #f9fafb;
            color: #6b7280;
        }

        .auth-footer a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link {
            position: absolute;
            top: 1rem;
            left: 1rem;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            transition: background 0.3s;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 480px) {
            .auth-container {
                border-radius: 0;
                min-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-clipboard-check"></i></div>
                <span><span class="text-dark">Analysis</span><span class="text-gradient">Hub</span></span>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Log in to your account</p>
        </div>

        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="email">Email or Username</label>
                <input type="text" id="email" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>

            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="submit-btn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>

            <div class="divider">or</div>

            <div class="oauth-buttons">
                <button type="button" class="oauth-btn" id="githubBtn">
                    <i class="fab fa-github"></i> GitHub
                </button>
                <button type="button" class="oauth-btn" id="googleBtn">
                    <i class="fab fa-google"></i> Google
                </button>
            </div>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>

    <!-- Load MVC Structure -->
    <script src="../app.js"></script>
    
    <script>
        // Login page controller
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = e.target.querySelector('.submit-btn');
            
            if (!email || !password) {
                utils.showToast('Please fill in all fields', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            utils.showLoading('Authenticating...');
            
            try {
                await authController.login({
                    emailOrUsername: email,
                    password
                });
                
                utils.hideLoading();
                utils.showToast('Login successful!', 'success');
                
                setTimeout(() => {
                    const redirectUrl = authController.getRedirectUrl();
                    window.location.href = redirectUrl;
                }, 1000);
            } catch (error) {
                utils.hideLoading();
                utils.showToast(error.message || 'Login failed', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        });

        // OAuth buttons
        document.getElementById('githubBtn').addEventListener('click', async () => {
            try {
                utils.showLoading('Redirecting to GitHub...');
                const authUrl = await authController.getGitHubAuthUrl();
                window.location.href = authUrl;
            } catch (error) {
                utils.hideLoading();
                utils.showToast(error.message, 'error');
            }
        });

        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                utils.showLoading('Redirecting to Google...');
                const authUrl = await authController.getGoogleAuthUrl();
                window.location.href = authUrl;
            } catch (error) {
                utils.hideLoading();
                utils.showToast(error.message, 'error');
            }
        });

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            if (authController.isAuthenticated()) {
                utils.showToast('You are already logged in', 'info');
                setTimeout(() => {
                    const redirectUrl = authController.getRedirectUrl();
                    window.location.href = redirectUrl;
                }, 1500);
            }
        });
    </script>
</body>
</html>
